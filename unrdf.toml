[project]
name = "bcinr"
version = "0.1.0"
description = "BranchlessCInRust: Academic-grade branchless algorithm library"

[ontology]
source = "./ontology/bcinr.ttl"
format = "turtle"

[generation]
output_dir = "."
templates_dir = "./templates"

[[generation.rules]]
name = "bootstrap-lib"
description = "Bootstrap src/lib.rs once (skip if exists)"
query = "SELECT ?crateName WHERE { ?crateName bcinr:id \"bcinr-core\" }"
template = "./templates/lib.njk"
output_file = "bcinr-core/src/lib.rs"
mode = "skip_existing"

[[generation.rules]]
name = "overwrite-logic-mod"
description = "Regenerate src/logic/mod.rs with all family mod declarations"
query = """
PREFIX bcinr: <http://bcinr.rs/ontology/>

SELECT ?familyId
WHERE {
  ?f a bcinr:AlgorithmFamily ;
     bcinr:id ?familyId .
}
ORDER BY ?familyId
"""
template = "./templates/logic-mod.njk"
output_file = "bcinr-core/src/logic/mod.rs"
mode = "overwrite"

[[generation.rules]]
name = "bootstrap-logic-families"
description = "Bootstrap src/logic/FAMILY.rs once per family (skip if exists)"
query = """
PREFIX bcinr: <http://bcinr.rs/ontology/>

SELECT ?familyId ?label ?description
  (GROUP_CONCAT(?symbolName; separator=",") AS ?symbols)
WHERE {
  ?f a bcinr:AlgorithmFamily ;
     bcinr:id ?familyId ;
     bcinr:label ?label ;
     bcinr:description ?description .
  OPTIONAL {
    ?sym a bcinr:ApiSymbol ;
         bcinr:ofFamily ?f ;
         bcinr:name ?symbolName .
  }
}
GROUP BY ?familyId ?label ?description
ORDER BY ?familyId
"""
template = "./templates/logic-family.njk"
output_file = "bcinr-core/src/logic/{{ familyId }}.rs"
mode = "skip_existing"

[[generation.rules]]
name = "generate-api-families"
description = "Generate src/api/FAMILY.rs per family (overwrite every sync)"
query = """
PREFIX bcinr: <http://bcinr.rs/ontology/>

SELECT ?familyId ?label ?description
  (GROUP_CONCAT(?symbolName; separator=",") AS ?symbols)
WHERE {
  ?f a bcinr:AlgorithmFamily ;
     bcinr:id ?familyId ;
     bcinr:label ?label ;
     bcinr:description ?description .
  OPTIONAL {
    ?sym a bcinr:ApiSymbol ;
         bcinr:ofFamily ?f ;
         bcinr:name ?symbolName .
  }
}
GROUP BY ?familyId ?label ?description
ORDER BY ?familyId
"""
template = "./templates/api-family.njk"
output_file = "bcinr-core/src/api/{{ familyId }}.rs"
mode = "overwrite"

[[generation.rules]]
name = "generate-api-mod"
description = "Generate src/api/mod.rs with all family re-exports"
query = """
PREFIX bcinr: <http://bcinr.rs/ontology/>

SELECT ?familyId
WHERE {
  ?f a bcinr:AlgorithmFamily ;
     bcinr:id ?familyId .
}
ORDER BY ?familyId
"""
template = "./templates/api-mod.njk"
output_file = "bcinr-core/src/api/mod.rs"
mode = "overwrite"
